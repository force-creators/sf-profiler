name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy web app
    runs-on: ubuntu-latest
    environment: main
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web app
        run: npm run typecheck -w @sfdc-profiler/web

      - name: Build web app
        run: npm run build -w @sfdc-profiler/web

      - name: Validate deployment configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret is required."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID environment variable is required."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_WORKER_NAME" ]; then
            echo "CLOUDFLARE_WORKER_NAME environment variable is required."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy --config wrangler.jsonc --name ${{ vars.CLOUDFLARE_WORKER_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
